<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Playfair+Display+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body class="light" id="site">

  <div class="wrap">

    <header class="b-header">
      <a href="{{ "/" | relURL }}" class="site-name">{{ .Site.Title }}</a>
      <nav class="b-nav">
        {{ range .Site.Params.nav }}
          <a href="{{ .url | relURL }}">{{ .name }}</a>
        {{ end }}
        <button class="toggle-btn" onclick="toggleDark()">dark mode</button>
      </nav>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="b-footer">
      <div class="b-footer-name">{{ .Site.Params.author }}</div>
      <div class="b-creds">
        {{ range .Site.Params.credentials }}
          <span>{{ . }}</span>
        {{ end }}
      </div>
      <div class="footer-links">
        {{ range .Site.Params.social }}
          <a href="{{ .url }}" class="ext-btn" target="_blank" rel="noopener">{{ .name }} ↗</a>
        {{ end }}
      </div>
    </footer>

  </div>

  <script src="{{ "js/filters.js" | relURL }}"></script>

</body>
</html>
